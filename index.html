<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Enviar Nota</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-light: #E1F5EE;
      --amber-light: #FAEEDA;
      --amber-text: #633806;
      --amber-icon: #BA7517;
      --red-light: #FCEBEB;
      --red-text: #A32D2D;
      --bg: #f5f5f4;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --input-bg: #f9f9f8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --card-bg: #2a2a28;
        --text: #f0efe8;
        --text-muted: #9ca3a0;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.25);
        --input-bg: #333330;
        --green-light: #083828;
        --amber-light: #3a2800;
        --amber-text: #FAC775;
        --amber-icon: #EF9F27;
        --red-light: #3a1010;
        --red-text: #F09595;
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    .app-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .app-logo {
      width: 72px;
      height: 72px;
      background: var(--green);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .app-logo i {
      font-size: 36px;
      color: #fff;
    }

    .app-header h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .app-header p {
      font-size: 15px;
      color: var(--text-muted);
    }

    /* Aviso de configuração — remova este bloco após configurar */
    .config-note {
      background: var(--amber-light);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: var(--amber-text);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .config-note i { font-size: 18px; color: var(--amber-icon); flex-shrink: 0; margin-top: 1px; }
    .config-note strong { display: block; margin-bottom: 4px; font-size: 14px; }
    .config-note code {
      display: inline-block;
      background: rgba(0,0,0,0.08);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 12px;
    }

    .step-card {
      background: var(--card-bg);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .step-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .step-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--green-light);
      color: var(--green-dark);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-label span {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    .cam-btn {
      width: 100%;
      min-height: 150px;
      border: 2px dashed var(--border-hover);
      border-radius: 12px;
      background: var(--input-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .cam-btn:hover, .cam-btn:active {
      border-color: var(--green);
      background: var(--green-light);
    }

    .cam-btn i { font-size: 44px; color: var(--green); }

    .cam-btn span {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .cam-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
      width: 100%;
      height: 100%;
    }

    .preview-wrap {
      display: none;
      position: relative;
    }

    .preview-wrap img {
      width: 100%;
      border-radius: 12px;
      display: block;
      max-height: 320px;
      object-fit: cover;
    }

    .preview-change {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .preview-change i { font-size: 16px; }

    .preview-change input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
      width: 100%;
      height: 100%;
    }

    .name-input {
      width: 100%;
      font-size: 17px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 0.5px solid var(--border-hover);
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .name-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
    }

    .name-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      background: var(--green);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:hover { background: var(--green-dark); }
    .send-btn:active { transform: scale(0.98); }

    .send-btn:disabled {
      background: var(--border-hover);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .send-btn i { font-size: 24px; }

    .status-msg {
      display: none;
      text-align: center;
      padding: 1.1rem;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      margin-top: 1rem;
    }

    .status-msg.success {
      background: var(--green-light);
      color: var(--green-dark);
      display: block;
    }

    .status-msg.error {
      background: var(--red-light);
      color: var(--red-text);
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
<div class="app-wrap">

  <div class="app-header">
    <div class="app-logo">
      <i class="ti ti-receipt"></i>
    </div>
    <h1>Enviar nota</h1>
    <p>Tire foto e mande para o chefe</p>
  </div>



  <div class="step-card">
    <div class="step-label">
      <div class="step-num">1</div>
      <span>Foto da nota</span>
    </div>
    <div class="cam-btn" id="camBtn">
      <i class="ti ti-camera"></i>
      <span>Abrir câmera</span>
      <input type="file" id="fileInput" accept="image/*" capture="environment" aria-label="Tirar foto da nota">
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Foto da nota">
      <button class="preview-change" type="button" aria-label="Trocar foto">
        <i class="ti ti-camera"></i> Trocar foto
        <input type="file" id="fileInput2" accept="image/*" capture="environment" aria-label="Trocar foto">
      </button>
    </div>
  </div>

  <div class="step-card">
    <div class="step-label">
      <div class="step-num">2</div>
      <span>Seu nome</span>
    </div>
    <input
      type="text"
      class="name-input"
      id="nomeInput"
      placeholder="Ex: João da Silva"
      autocomplete="name"
      enterkeyhint="send"
    >
  </div>

  <button class="send-btn" id="sendBtn" type="button" disabled>
    <i class="ti ti-send"></i>
    Enviar
  </button>

  <div class="status-msg" id="statusMsg"></div>

</div>

<script>
  // ============================================================
  // CONFIGURAÇÃO — substitua os valores abaixo
  // ============================================================
  const CONFIG = {
    serviceId:  'service_i5ym4ab',
    templateId: 'template_tl88zq4',
    publicKey:  'aW32U_qN4P2HBtIuH',
    destEmail:  'SEU_EMAIL@gmail.com' // ← Coloque aqui o seu e-mail
  };
  // ============================================================

  const fileInput   = document.getElementById('fileInput');
  const fileInput2  = document.getElementById('fileInput2');
  const previewImg  = document.getElementById('previewImg');
  const previewWrap = document.getElementById('previewWrap');
  const camBtn      = document.getElementById('camBtn');
  const nomeInput   = document.getElementById('nomeInput');
  const sendBtn     = document.getElementById('sendBtn');
  const statusMsg   = document.getElementById('statusMsg');

  let imageBase64 = null;
  let imageName   = null;
  let imageType   = null;

  function handleFile(file) {
    if (!file) return;
    imageName = file.name || 'nota.jpg';
    imageType = file.type || 'image/jpeg';

    // Reduz a imagem antes de enviar (máx 1200px, qualidade 0.75)
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxSize = 1200;
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
          else { width = Math.round(width * maxSize / height); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        imageBase64 = dataUrl.split(',')[1];
        previewImg.src = dataUrl;
        camBtn.style.display = 'none';
        previewWrap.style.display = 'block';
        checkReady();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change',  (e) => handleFile(e.target.files[0]));
  fileInput2.addEventListener('change', (e) => handleFile(e.target.files[0]));
  nomeInput.addEventListener('input', checkReady);

  function checkReady() {
    sendBtn.disabled = !(imageBase64 && nomeInput.value.trim().length > 1);
  }

  sendBtn.addEventListener('click', async () => {
    const nome = nomeInput.value.trim();
    if (!imageBase64 || !nome) return;

    sendBtn.disabled = true;
    sendBtn.innerHTML = '<i class="ti ti-loader-2 spinning"></i> Enviando...';
    statusMsg.className = 'status-msg';
    statusMsg.style.display = 'none';

    const now = new Date().toLocaleString('pt-BR');

    const payload = {
      service_id:  CONFIG.serviceId,
      template_id: CONFIG.templateId,
      user_id:     CONFIG.publicKey,
      template_params: {
        from_name:  nome,
        to_email:   CONFIG.destEmail,
        send_time:  now,
        message:    `Nota enviada por ${nome} em ${now}`,
        image_data: `data:${imageType};base64,${imageBase64}`,
      }
    };

    try {
      const resp = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });

      if (resp.ok) {
        statusMsg.textContent = '✓ Nota enviada com sucesso!';
        statusMsg.className = 'status-msg success';
        // Reseta o formulário
        nomeInput.value = '';
        imageBase64 = null;
        previewWrap.style.display = 'none';
        camBtn.style.display = 'flex';
        fileInput.value  = '';
        fileInput2.value = '';
        sendBtn.innerHTML = '<i class="ti ti-send"></i> Enviar';
      } else {
        const txt = await resp.text();
        throw new Error(txt || resp.status);
      }
    } catch (err) {
      console.error(err);
      statusMsg.textContent = '✗ Erro ao enviar. Verifique a conexão e tente de novo.';
      statusMsg.className = 'status-msg error';
      sendBtn.innerHTML = '<i class="ti ti-send"></i> Enviar';
      sendBtn.disabled = false;
    }
  });
</script>
</body>
</html>
